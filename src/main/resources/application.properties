server.port=8082
spring.application.name=stock-dashboard-backend

# Used by YahooFinanceService - Yahoo's public chart API, no key required
app.yahoo.base-url=https://query1.finance.yahoo.com/v8/finance/chart

# Used by CacheConfig for the stockIndicators/stockSearch Caffeine cache.
# 1800s = 30 min is a reasonable default for intraday-ish technical data;
# tighten it if you're checking charts mid-session, loosen it if you only
# look once a day. Fundamentals (Screener.in) have their own fixed 24h TTL
# set directly in CacheConfig since they don't need to be configurable.
app.cache.indicators-ttl-seconds=1800

# Gemini API (Google AI Studio) - powers the AI Analysis tab (analysis + chat).
# Get a free key at https://aistudio.google.com/apikey and set it via the
# GEMINI_API_KEY environment variable before starting the backend - never
# commit the literal key into this file.
app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.base-url=https://generativelanguage.googleapis.com/v1beta/models
app.gemini.model=gemini-2.5-flash

server.error.include-message=always

# Used by StockSearchService to refresh the NSE symbol list from an external
# file (writable, unlike the classpath) instead of a hand-maintained CSV.
app.symbols.source-url=https://nsearchives.nseindia.com/content/equities/EQUITY_L.csv
app.symbols.file-path=data/nse_symbols.csv
app.symbols.refresh-cron=0 0 2 * * *
