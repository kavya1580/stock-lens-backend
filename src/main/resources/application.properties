server.port=8080
spring.application.name=stock-dashboard-backend

# Used by YahooFinanceService - Yahoo's public chart API, no key required
app.yahoo.base-url=https://query1.finance.yahoo.com/v8/finance/chart

# Used by CacheConfig for the stockIndicators/stockSearch Caffeine cache.
# 1800s = 30 min is a reasonable default for intraday-ish technical data;
# tighten it if you're checking charts mid-session, loosen it if you only
# look once a day. Fundamentals (Screener.in) have their own fixed 24h TTL
# set directly in CacheConfig since they don't need to be configurable.
app.cache.indicators-ttl-seconds=1800

server.error.include-message=always
